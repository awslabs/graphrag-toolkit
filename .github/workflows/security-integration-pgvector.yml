# Runs the SQL injection integration test for the PGVector store against a live
# Postgres+pgvector engine (service container), so the fix is demonstrated
# working on release and on PRs that touch the sink or the test.
name: Security Integration - PGVector SQL injection

permissions:
  contents: read

on:
  release:
    types: [published]
  pull_request:
    paths:
      - "lexical-graph/src/graphrag_toolkit/lexical_graph/storage/vector/pg_vector_indexes.py"
      - "integration-tests/security/test_pgvector_sql_injection.py"
      - ".github/workflows/security-integration-pgvector.yml"
  workflow_dispatch:

jobs:
  pgvector-sql-injection:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install ./lexical-graph
          pip install pytest psycopg2-binary pgvector numpy
      - name: Run PGVector SQL-injection test
        env:
          PGVECTOR_TEST_DSN: "host=localhost port=5432 dbname=testdb user=test password=test"
        run: pytest integration-tests/security/test_pgvector_sql_injection.py -v
