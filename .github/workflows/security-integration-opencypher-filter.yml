# Runs the OpenCypher filter-injection integration test for the lexical-graph
# filter builder against a live openCypher engine (Neo4j service container), so
# the fix is demonstrated working on release and on PRs that touch the sink or
# the test.
name: Security Integration - lexical-graph OpenCypher filter injection

permissions:
  contents: read

on:
  release:
    types: [published]
  pull_request:
    paths:
      - "lexical-graph/src/graphrag_toolkit/lexical_graph/storage/graph/graph_utils.py"
      - "integration-tests/security/test_opencypher_filter_injection.py"
      - ".github/workflows/security-integration-opencypher-filter.yml"
  workflow_dispatch:

jobs:
  opencypher-filter-injection:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.25-community
        env:
          NEO4J_AUTH: neo4j/testpassword123
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword123 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install ./lexical-graph
          pip install pytest neo4j
      - name: Run OpenCypher filter-injection test
        env:
          NEO4J_TEST_URI: "bolt://localhost:7687"
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: testpassword123
        run: pytest integration-tests/security/test_opencypher_filter_injection.py -v
