# Runs the property-name injection integration test for the byokg-rag Neptune
# store against a live openCypher engine (Neo4j service container), so the fix is
# demonstrated working on release and on PRs that touch the sink or the test.
name: Security Integration - byokg property injection

permissions:
  contents: read

on:
  release:
    types: [published]
  pull_request:
    paths:
      - "byokg-rag/src/graphrag_toolkit/byokg_rag/graphstore/neptune.py"
      - "integration-tests/security/test_byokg_property_injection.py"
      - ".github/workflows/security-integration-byokg-property.yml"
  workflow_dispatch:

jobs:
  byokg-property-injection:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.25-community
        env:
          NEO4J_AUTH: neo4j/testpassword123
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword123 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install ./byokg-rag
          pip install pytest neo4j
      - name: Run byokg property-injection test
        env:
          NEO4J_TEST_URI: "bolt://localhost:7687"
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: testpassword123
        run: pytest integration-tests/security/test_byokg_property_injection.py -v
